name: Try Web Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Try to download via web service
        run: |
          mkdir -p videos
          cd videos
          
          # Example: Try to call a hypothetical API (replace with actual endpoint)
          # This is a placeholder – real sites require browser emulation
          curl -s "https://freightpass.ca/api/download?url=${{ github.event.inputs.url }}" -o video.mp4
          
          # If the above doesn't work, try using yt-dlp with a custom user-agent
          # but that's back to the original problem.

      - name: Commit if file exists
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add videos/
          git commit -m "Try download" || echo "No file downloaded"
          git push
