name: Download YouTube Video with yt-dlp-proxy (Patched)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip ffmpeg zip make

      - name: Clone and patch yt-dlp-proxy
        run: |
          git clone https://github.com/Petrprogs/yt-dlp-proxy.git
          cd yt-dlp-proxy
          # Change the hardcoded path from /usr/local/proxy.json to ./proxy.json
          sed -i 's|/usr/local/proxy.json|./proxy.json|g' main.py
          make build
          sudo make install
          cd ..
          rm -rf yt-dlp-proxy

      - name: Update proxy list (writes to current directory)
        run: |
          # Create empty proxy.json in current dir
          touch proxy.json
          yt-dlp-proxy update --max-workers 10

      - name: Download video
        run: |
          mkdir -p downloads
          cd downloads
          yt-dlp-proxy -f "bestvideo+bestaudio/best" -o "%(title)s.%(ext)s" "${{ github.event.inputs.url }}"

      - name: Split into 90MB zip parts
        run: |
          cd downloads
          for f in *; do
            if [ -f "$f" ] && [ $(stat -c%s "$f") -gt $((90*1024*1024)) ]; then
              zip -s 90m "${f%.*}.zip" "$f" && rm "$f"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add downloads/
          git diff --staged --quiet || git commit -m "Add YouTube video from ${{ github.event.inputs.url }}"
          git push
