name: Download YouTube Video via Cobalt API

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt install -y jq
      - name: Get direct link and download
        run: |
          mkdir -p downloads
          cd downloads
          RESPONSE=$(curl -s -X POST https://api.cobalt.tools/api/json \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"${{ github.event.inputs.url }}\"}")
          DIRECT_URL=$(echo "$RESPONSE" | jq -r '.url')
          if [ "$DIRECT_URL" = "null" ]; then
            echo "Error: $RESPONSE"
            exit 1
          fi
          wget --content-disposition "$DIRECT_URL"
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git add downloads/
          git commit -m "Add video" || true
          git push
