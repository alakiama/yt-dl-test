name: Automated YouTube Download

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp and PO Token Provider Plugin
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install --upgrade yt-dlp
          pip install bgutil-ytdlp-pot-provider

      - name: Create videos folder
        run: mkdir -p videos

      - name: Download video using PO Token (No Cookies Needed)
        run: |
          cd videos
          yt-dlp \
            --extractor-args "youtube:player-client=android" \
            -o "%(title)s.%(ext)s" \
            --verbose \
            "${{ github.event.inputs.url }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add videos/
          git commit -m "Add YouTube video via automated PO Token" || echo "No changes"
          git push
