name: 🎬 YouTube Video Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Video quality'
        required: false
        default: '720'
        type: choice
        options:
          - '1080'
          - '720'
          - '480'
          - '360'
          - 'audio'
      split_threshold_mb:
        description: 'Split files larger than this MB (0 = never split, recommended: 90)'
        required: false
        default: 90
        type: number

jobs:
  download-video:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq aria2 zip ffmpeg

      - name: AVASAM YouTube Downloader - https://avasam.ir
        run: |
          echo "🏷️  AVASAM - YouTube Video Download Solution"
          echo "🌐 https://avasam.ir"
          echo ""

      - name: Download YouTube video via Piped API
        run: |
          VIDEO_URL="${{ github.event.inputs.video_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          SPLIT_THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          echo "🏷️  AVASAM (https://avasam.ir) - YouTube Downloader"
          echo "📺 Video URL: $VIDEO_URL"
          echo "🎯 Quality: $QUALITY"
          echo ""

          mkdir -p videos tmp_downloads

          # Extract video ID from URL
          VIDEO_ID=$(echo "$VIDEO_URL" | grep -oP '(?:v=|youtu\.be/|/embed/|/v/)?\K[a-zA-Z0-9_-]{11}' | head -1)

          if [ -z "$VIDEO_ID" ]; then
            echo "❌ Could not extract video ID from URL"
            exit 1
          fi

          echo "🔑 Video ID: $VIDEO_ID"

          # List of Piped API instances to try
          PIPED_INSTANCES=(
            "pipedapi.kavin.rocks"
            "pipedapi.adminforge.de"
            "api.piped.privacydev.net"
            "pipedapi.in.projectsegfau.lt"
            "pipedapi.leptons.xyz"
          )

          DOWNLOAD_URL=""
          AUDIO_URL=""
          VIDEO_TITLE=""

          # Try each Piped instance
          for INSTANCE in "${PIPED_INSTANCES[@]}"; do
            echo "📡 Trying Piped instance: $INSTANCE"

            RESPONSE=$(curl -s --max-time 30 "https://${INSTANCE}/streams/${VIDEO_ID}" 2>/dev/null)

            # Check if response is valid
            if echo "$RESPONSE" | jq -e '.videoStreams' > /dev/null 2>&1; then
              VIDEO_TITLE=$(echo "$RESPONSE" | jq -r '.title // "video"' | tr -cd '[:alnum:] _-' | tr ' ' '_')

              if [ "$QUALITY" = "audio" ]; then
                # Get best audio stream
                DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.audioStreams | sort_by(.bitrate) | reverse | .[0].url // empty')
                echo "🎵 Audio mode selected"
              else
                # Get video stream matching quality
                DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r --arg q "${QUALITY}p" \
                  '.videoStreams | map(select(.quality == $q)) | .[0].url // empty')

                # If exact quality not found, get closest lower quality
                if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
                  DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r \
                    '.videoStreams | sort_by(.quality | gsub("p";"") | tonumber) | reverse | .[0].url // empty')
                fi

                # Get audio stream for merging
                AUDIO_URL=$(echo "$RESPONSE" | jq -r '.audioStreams | sort_by(.bitrate) | reverse | .[0].url // empty')
              fi

              if [ -n "$DOWNLOAD_URL" ] && [ "$DOWNLOAD_URL" != "null" ]; then
                echo "✅ Found streams on $INSTANCE"
                break
              fi
            fi

            echo "⚠️ Instance $INSTANCE failed, trying next..."
          done

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "❌ Could not get download URL from any Piped instance"
            exit 1
          fi

          echo "📥 Video title: $VIDEO_TITLE"

          TIMESTAMP=$(date +%Y%m%d_%H%M%S)

          if [ "$QUALITY" = "audio" ]; then
            FILENAME="${VIDEO_TITLE}_${TIMESTAMP}.m4a"
            echo "⬇️ Downloading audio: $FILENAME"

            aria2c \
              --split=4 \
              --max-connection-per-server=4 \
              --dir="tmp_downloads" \
              --out="$FILENAME" \
              "$DOWNLOAD_URL"
          else
            VIDEO_FILE="tmp_downloads/video_${TIMESTAMP}.mp4"
            AUDIO_FILE="tmp_downloads/audio_${TIMESTAMP}.m4a"
            FINAL_FILE="tmp_downloads/${VIDEO_TITLE}_${QUALITY}p_${TIMESTAMP}.mp4"

            echo "⬇️ Downloading video stream..."
            aria2c \
              --split=4 \
              --max-connection-per-server=4 \
              --dir="." \
              --out="$VIDEO_FILE" \
              "$DOWNLOAD_URL"

            if [ -n "$AUDIO_URL" ] && [ "$AUDIO_URL" != "null" ]; then
              echo "⬇️ Downloading audio stream..."
              aria2c \
                --split=4 \
                --max-connection-per-server=4 \
                --dir="." \
                --out="$AUDIO_FILE" \
                "$AUDIO_URL"

              echo "🔀 Merging video and audio with ffmpeg..."
              ffmpeg -y -i "$VIDEO_FILE" -i "$AUDIO_FILE" -c:v copy -c:a aac "$FINAL_FILE"
              rm -f "$VIDEO_FILE" "$AUDIO_FILE"
            else
              mv "$VIDEO_FILE" "$FINAL_FILE"
            fi
          fi

          echo "✅ Download completed!"

          # Check if any files were downloaded
          if [ -z "$(ls -A tmp_downloads 2>/dev/null)" ]; then
            echo "❌ No files were downloaded"
            exit 1
          fi

          # Handle splitting large files
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")

            echo "📄 Processing: $BASENAME ($(( SIZE / 1024 / 1024 ))MB)"

            if [ "$SPLIT_THRESHOLD_BYTES" -gt 0 ] && [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting into ${SPLIT_THRESHOLD_MB}MB parts"
              zip -0 -s "${SPLIT_THRESHOLD_MB}m" "videos/${BASENAME}.zip" -j "$FILE"
              PART_COUNT=$(ls videos/${BASENAME}.z* 2>/dev/null | wc -l)
              echo "✅ Split into $PART_COUNT parts"
            else
              cp "$FILE" "videos/$BASENAME"
              echo "✅ Copied to videos folder"
            fi
          done

          rm -rf tmp_downloads
          echo ""
          echo "📦 Files ready in videos folder:"
          ls -lh videos/

      - name: Commit & Push video files (AVASAM)
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "🏷️  AVASAM (https://avasam.ir) - Committing video files"

          mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard videos/)

          TOTAL=${#ALL_FILES[@]}
          echo "📦 Total files to push: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi

          BATCH_SIZE=3
          BATCH_NUM=0

          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")

            echo "🚀 Pushing batch $BATCH_NUM: files $((i+1))–$(( i + ${#BATCH[@]} )) of $TOTAL"

            git add "${BATCH[@]}"
            git commit -m "[AVASAM] 🎬 YouTube video download — batch $BATCH_NUM [skip ci]"

            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"

            echo "✅ Batch $BATCH_NUM pushed"
          done

          echo "🎉 All $TOTAL files pushed in $BATCH_NUM batch(es)"
          echo "🏷️  AVASAM (https://avasam.ir) - Download Complete!"
