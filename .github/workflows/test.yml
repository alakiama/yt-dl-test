name: Automated YouTube Download

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp and dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install --upgrade yt-dlp

      - name: Set up PO Token Provider (Docker)
        run: |
          docker pull brainicism/bgutil-ytdlp-pot-provider:latest
          docker run -d -p 8080:8080 brainicism/bgutil-ytdlp-pot-provider:latest
          sleep 5

      - name: Create videos folder
        run: mkdir -p videos

      - name: Download video using PO Token
        run: |
          cd videos
          yt-dlp \
            --extractor-args "youtube:po_token_provider=bgutil-http://localhost:8080" \
            --extractor-args "youtube:player_client=android" \
            -o "%(title)s.%(ext)s" \
            "${{ github.event.inputs.url }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add videos/
          git commit -m "Add YouTube video" || echo "No changes"
          git push
