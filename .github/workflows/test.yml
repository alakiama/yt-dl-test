name: 🔻 Download YouTube Video (PO Tokens)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    env:
      YT_URL: ${{ github.event.inputs.url }}
    steps:
      - uses: actions/checkout@v4

      # 1. Install yt-dlp with essential extras for JS challenge solving
      - name: Install yt-dlp & ffmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg zip
          pip3 install --upgrade "yt-dlp[default]"

      # 2. Start the bgutil PO token provider via Docker (runs HTTP server)
      - name: Run token provider (bgutil)
        run: |
          docker run -d --name bgutil-provider -p 4416:4416 brainicism/bgutil-ytdlp-pot-provider
          sleep 5

      # 3. yt-dlp download with PO token linkage
      - name: Download video with PO token
        run: |
          mkdir -p downloads
          cd downloads
          yt-dlp \
            --extractor-args "youtube:pot-provider=bgutil:http://localhost:4416" \
            -f "bestvideo+bestaudio/best" \
            -o "%(title)s.%(ext)s" \
            "$YT_URL"

      # (Optional) Split files into 90MB zip parts
      - name: Split large files
        run: |
          cd downloads
          for f in *; do
            if [ -f "$f" ] && [ $(stat -c%s "$f") -gt $((90*1024*1024)) ]; then
              zip -s 90m "${f%.*}.zip" "$f" && rm "$f"
            fi
          done

      # 4. Commit & push results
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git add downloads/
          git diff --staged --quiet || git commit -m "Add YouTube video from $YT_URL"
          git push
