name: Download with Lux
on: workflow_dispatch
inputs: { url: { required: true, type: string } }
permissions: { contents: write }
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          wget https://github.com/iaw002/lux/releases/latest/download/lux_linux_amd64.tar.gz
          tar -xzf lux_linux_amd64.tar.gz
          sudo mv lux /usr/local/bin/
      - run: mkdir -p videos && lux -o ./videos "${{ github.event.inputs.url }}"
      - run: |
          git config user.name github-actions
          git add videos/ && git commit -m "video" || true
          git push
