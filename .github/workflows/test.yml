name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install latest yt-dlp and ffmpeg
        run: |
          sudo apt update
          sudo apt install -y python3-pip ffmpeg
          pip3 install --upgrade yt-dlp

      - name: Create videos folder
        run: mkdir -p videos

      - name: Write cookies file from secret
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
          # Verify first line (optional, for debugging)
          head -1 cookies.txt

      - name: Download YouTube video
        run: |
          cd videos
          yt-dlp \
            --cookies ../cookies.txt \
            --extractor-args "youtube:player-client=android" \
            -o "%(title)s.%(ext)s" \
            "${{ github.event.inputs.url }}"

      - name: Commit and push downloaded video
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add videos/
          git commit -m "Add YouTube video from ${{ github.event.inputs.url }}" || echo "No changes to commit"
          git push
