name: Test YouTube Download with Free Proxy

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: pip install yt-dlp
      - run: |
          # Using a public free proxy (example, likely dead)
          yt-dlp --proxy "http://103.152.172.40:80" -g "${{ github.event.inputs.url }}"
