name: Download YouTube Video with Proxy Router

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Install Python, pip, and other necessary tools
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip make

      # 2. Install yt-dlp-proxy (Method by building from source)
      - name: Install yt-dlp-proxy
        run: |
          git clone https://github.com/Petrprogs/yt-dlp-proxy.git
          cd yt-dlp-proxy
          make build
          sudo make install
          cd ..
          rm -rf yt-dlp-proxy

      # 3. Update the proxy list and perform a speed test to find the best one.
      # This step may take some time as it tests the proxies.
      - name: Update and test proxy list
        run: yt-dlp-proxy update --max-workers 10

      # 4. Create directory and download the video using the best found proxy.
      - name: Download video using found proxy
        run: |
          mkdir -p downloads
          cd downloads
          # The command forwards all arguments to yt-dlp
          yt-dlp-proxy -f "bestvideo+bestaudio/best" -o "%(title)s.%(ext)s" "${{ github.event.inputs.url }}"

      # 5. Split file into 90MB parts if it exceeds 90MB
      - name: Split large video files
        run: |
          cd downloads
          for file in *; do
            if [ -f "$file" ] && [ $(stat -c%s "$file") -gt $((90 * 1024 * 1024)) ]; then
              echo "Splitting $file into 90MB zip parts..."
              zip -s 90m "${file%.*}.zip" "$file"
              rm "$file"
            fi
          done

      # 6. Commit and push the downloaded file(s) to the repository
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git diff --staged --quiet || git commit -m "Add YouTube video from ${{ github.event.inputs.url }}"
          git push
