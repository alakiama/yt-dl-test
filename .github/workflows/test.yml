name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup yt-dlp (EJS Node + FFmpeg)
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ejs-node: true
          ffmpeg: true

      - name: Create downloads folder
        run: mkdir -p downloads

      - name: Download video (no cookies needed)
        run: |
          cd downloads
          yt-dlp -f "bestvideo+bestaudio/best" -o "%(title)s.%(ext)s" "${{ github.event.inputs.url }}"

      - name: Split large files (>90MB) into zip parts
        run: |
          cd downloads
          for f in *; do
            if [ -f "$f" ] && [ $(stat -c%s "$f") -gt $((90*1024*1024)) ]; then
              zip -s 90m "${f%.*}.zip" "$f" && rm "$f"
            fi
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add downloads/ && git commit -m "Video from ${{ github.event.inputs.url }}" || true && git push
