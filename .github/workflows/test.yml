name: Download YouTube Video (No Cookies)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp with curl_cffi and ffmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg zip
          pip install --upgrade pip
          pip install "yt-dlp[default,curl_cffi]"

      - name: Create downloads folder
        run: mkdir -p downloads

      - name: Download video using TLS impersonation
        run: |
          cd downloads
          yt-dlp \
            --impersonate chrome \
            --extractor-args "youtube:player_client=android" \
            --extractor-args "youtube:include_annotations=0" \
            -f "bestvideo+bestaudio/best" \
            -o "%(title)s.%(ext)s" \
            "${{ github.event.inputs.url }}"

      - name: Split files larger than 90MB into zip parts
        run: |
          cd downloads
          for f in *; do
            if [ -f "$f" ] && [ $(stat -c%s "$f") -gt $((90 * 1024 * 1024)) ]; then
              echo "✂️ Splitting $f"
              zip -s 90m "${f%.*}.zip" "$f"
              rm "$f"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add downloads/
          git diff --staged --quiet || git commit -m "Add YouTube video from ${{ github.event.inputs.url }}"
          git push
