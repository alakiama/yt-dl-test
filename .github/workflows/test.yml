name: ⬇️  YouTube Download (PO Token + Zip Split)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
        type: string
      split_threshold_mb:
        description: 'Split zip files larger than this MB (0 = never split)'
        required: false
        default: 90
        type: number

permissions:
  contents: write

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yt-dlp, ffmpeg, zip and docker
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip docker.io
          pip3 install --upgrade yt-dlp
          pip3 install bgutil-ytdlp-pot-provider

      - name: Start PO Token Provider (Docker)
        run: |
          docker run -d --name pot-provider -p 4416:4416 brainicism/bgutil-ytdlp-pot-provider
          sleep 5   # wait for server to be ready

      - name: AVASAM Downloader - https://avasam.ir
        run: |
          echo "🏷️  AVASAM - YouTube Download with PO Token"
          echo "🌐 https://avasam.ir"

      - name: Download YouTube video
        id: download
        run: |
          mkdir -p downloads tmp_downloads
          URL="${{ github.event.inputs.url }}"
          SPLIT_THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          echo "⬇️ Downloading $URL using yt-dlp with PO token..."
          # Use best quality, output template includes title
          cd tmp_downloads
          yt-dlp \
            --extractor-args "youtube:po_token_provider=bgutil-http://localhost:4416" \
            --extractor-args "youtube:player_client=android" \
            -f "bestvideo+bestaudio/best" \
            -o "%(title)s.%(ext)s" \
            "$URL"
          cd ..

          # Get the downloaded file name (only one file expected)
          DOWNLOADED_FILE=$(ls tmp_downloads/ | head -1)
          SIZE=$(stat -c%s "tmp_downloads/$DOWNLOADED_FILE")
          BASENAME="${DOWNLOADED_FILE%.*}"

          echo "📁 Downloaded: $DOWNLOADED_FILE ($(( SIZE / 1024 / 1024 )) MB)"
          echo "BASENAME=$BASENAME" >> $GITHUB_ENV

          # Normal mode: split into zip parts if larger than threshold
          if [ "$SPLIT_THRESHOLD_BYTES" -gt 0 ] && [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
            echo "✂️ File exceeds ${SPLIT_THRESHOLD_MB}MB — splitting into zip parts"
            # Create a split zip archive (parts: .z01, .z02, ...)
            zip -0 -s "${SPLIT_THRESHOLD_MB}m" "downloads/${BASENAME}.zip" -j "tmp_downloads/$DOWNLOADED_FILE"
            echo "✅ Parts: $(ls downloads/${BASENAME}.z* 2>/dev/null | wc -l)"
            rm -rf tmp_downloads
          else
            # No split needed – just move the file as is
            echo "📦 File within limit – moving directly"
            mv "tmp_downloads/$DOWNLOADED_FILE" "downloads/$DOWNLOADED_FILE"
            rm -rf tmp_downloads
          fi

      - name: Commit & Push (batches of 5 files)
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "🏷️  AVASAM - Committing downloads"

          # Collect all new/modified files under downloads/
          mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard downloads/)

          TOTAL=${#ALL_FILES[@]}
          echo "📦 Total files to push: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi

          BATCH_SIZE=5
          BATCH_NUM=0

          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")

            echo "🚀 Pushing batch $BATCH_NUM: files $((i+1))–$(( i + ${#BATCH[@]} )) of $TOTAL"

            git add "${BATCH[@]}"
            git commit -m "[AVASAM] Add YouTube download — batch $BATCH_NUM [skip ci]"

            # Pull with rebase to avoid conflicts
            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"

            echo "✅ Batch $BATCH_NUM pushed"
          done

          echo "🎉 All $TOTAL files pushed in $BATCH_NUM batch(es) — AVASAM (https://avasam.ir)"
