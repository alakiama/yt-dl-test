name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yt-dlp and PO Token Plugin (bgutil-ytdlp-pot-provider)
        run: |
          # Install yt-dlp and the PO Token provider plugin
          # The plugin will automatically fetch & provide a PO Token
          python3 -m pip install --upgrade yt-dlp
          python3 -m pip install bgutil-ytdlp-pot-provider

      - name: Create videos folder
        run: mkdir -p videos

      - name: Download video using PO Token
        env:
          YT_URL: ${{ github.event.inputs.url }}
        run: |
          cd videos
          # The --verbose flag outputs detailed logs for debugging if needed
          yt-dlp --verbose "$YT_URL"

      - name: Commit and push video
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add videos/
          git diff --staged --quiet || git commit -m "Add YouTube video from ${{ github.event.inputs.url }}"
          git push
