name: 🎬 YouTube Video Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Video quality'
        required: false
        default: '720'
        type: choice
        options:
          - '2160'
          - '1080'
          - '720'
          - '480'
          - '360'
          - 'audio'
      split_threshold_mb:
        description: 'Split files larger than this MB (0 = never split, recommended: 90)'
        required: false
        default: 90
        type: number

jobs:
  download-video:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq aria2 zip ffmpeg

      - name: AVASAM YouTube Downloader - https://avasam.ir
        run: |
          echo "🏷️  AVASAM - YouTube Video Download Solution"
          echo "🌐 https://avasam.ir"
          echo ""

      - name: Get download link from Cobalt API
        id: cobalt
        run: |
          VIDEO_URL="${{ github.event.inputs.video_url }}"
          QUALITY="${{ github.event.inputs.quality }}"

          echo "🏷️  AVASAM (https://avasam.ir) - YouTube Downloader"
          echo "📺 Video URL: $VIDEO_URL"
          echo "🎯 Quality: ${QUALITY}p"
          echo ""

          # Set video quality for Cobalt API
          if [ "$QUALITY" = "audio" ]; then
            DOWNLOAD_MODE="audio"
            VIDEO_QUALITY="720"
          else
            DOWNLOAD_MODE="auto"
            VIDEO_QUALITY="$QUALITY"
          fi

          echo "⬇️ Getting download link from Cobalt..."

          # Call Cobalt API to get direct download link
          RESPONSE=$(curl -s -X POST "https://api.cobalt.tools/" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "{
              \"url\": \"$VIDEO_URL\",
              \"videoQuality\": \"$VIDEO_QUALITY\",
              \"downloadMode\": \"$DOWNLOAD_MODE\",
              \"filenameStyle\": \"basic\"
            }")

          echo "API Response: $RESPONSE"

          # Check for errors
          STATUS=$(echo "$RESPONSE" | jq -r '.status // empty')

          if [ "$STATUS" = "error" ]; then
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.code // .text // "Unknown error"')
            echo "❌ Error: $ERROR_MSG"
            exit 1
          fi

          # Extract download URL
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.url // empty')

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            # Check if it's a picker response (multiple options)
            PICKER_URL=$(echo "$RESPONSE" | jq -r '.picker[0].url // empty')
            if [ -n "$PICKER_URL" ] && [ "$PICKER_URL" != "null" ]; then
              DOWNLOAD_URL="$PICKER_URL"
            else
              echo "❌ Could not get download URL"
              echo "Response: $RESPONSE"
              exit 1
            fi
          fi

          echo "✅ Got download link!"
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

      - name: Download video file
        run: |
          DOWNLOAD_URL="${{ steps.cobalt.outputs.download_url }}"
          SPLIT_THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))
          QUALITY="${{ github.event.inputs.quality }}"

          mkdir -p videos tmp_downloads

          # Generate filename
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          if [ "$QUALITY" = "audio" ]; then
            FILENAME="youtube_audio_${TIMESTAMP}.mp3"
          else
            FILENAME="youtube_${QUALITY}p_${TIMESTAMP}.mp4"
          fi

          echo "⬇️ Downloading: $FILENAME"

          # Download with aria2 for speed
          aria2c \
            --split=4 \
            --max-connection-per-server=4 \
            --min-split-size=20M \
            --dir="tmp_downloads" \
            --out="$FILENAME" \
            "$DOWNLOAD_URL"

          echo "✅ Download completed!"

          # Handle splitting large files
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")

            echo "📄 Processing: $BASENAME ($(( SIZE / 1024 / 1024 ))MB)"

            if [ "$SPLIT_THRESHOLD_BYTES" -gt 0 ] && [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting into ${SPLIT_THRESHOLD_MB}MB parts"
              zip -0 -s "${SPLIT_THRESHOLD_MB}m" "videos/${BASENAME}.zip" -j "$FILE"
              PART_COUNT=$(ls videos/${BASENAME}.z* 2>/dev/null | wc -l)
              echo "✅ Split into $PART_COUNT parts"
            else
              cp "$FILE" "videos/$BASENAME"
              echo "✅ Copied to videos folder"
            fi
          done

          rm -rf tmp_downloads
          echo ""
          echo "📦 Files ready in videos folder:"
          ls -lh videos/

      - name: Commit & Push video files (AVASAM)
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "🏷️  AVASAM (https://avasam.ir) - Committing video files"

          mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard videos/)

          TOTAL=${#ALL_FILES[@]}
          echo "📦 Total files to push: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi

          BATCH_SIZE=3
          BATCH_NUM=0

          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")

            echo "🚀 Pushing batch $BATCH_NUM: files $((i+1))–$(( i + ${#BATCH[@]} )) of $TOTAL"

            git add "${BATCH[@]}"
            git commit -m "[AVASAM] 🎬 YouTube video download — batch $BATCH_NUM [skip ci]"

            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"

            echo "✅ Batch $BATCH_NUM pushed"
          done

          echo "🎉 All $TOTAL files pushed in $BATCH_NUM batch(es)"
          echo "🏷️  AVASAM (https://avasam.ir) - Download Complete!"
