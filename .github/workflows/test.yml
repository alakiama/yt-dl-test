name: Download YouTube Video (Setup yt-dlp Action)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Setup yt-dlp YouTube cookies (bypass bot detection)
        uses: AnimMouse/setup-yt-dlp/cookies@v3
        with:
          cookies: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Create downloads folder
        run: mkdir -p downloads

      - name: Download YouTube video to folder
        run: |
          cd downloads
          yt-dlp -f "bestvideo+bestaudio/best" -o "%(title)s.%(ext)s" "${{ github.event.inputs.url }}"

      - name: Commit and push video
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git diff --staged --quiet || git commit -m "Add YouTube video from ${{ github.event.inputs.url }}"
          git push
