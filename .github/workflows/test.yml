name: 🎬 YouTube Download (yt-dlp + WARP)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      format:
        description: 'Format (best, bestaudio, 1080p, 720p)'
        required: false
        default: 'best'
        type: string
      split_threshold_mb:
        description: 'Split files larger than this MB (0 = never split)'
        required: false
        default: 90
        type: number

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cloudflare WARP
        run: |
          # Install WARP
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          
          # Register and connect WARP
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos proxy port 40000
          warp-cli --accept-tos connect
          
          sleep 5
          echo "✅ WARP Status:"
          warp-cli status

      - name: Install yt-dlp
        run: |
          sudo apt-get install -y python3-pip ffmpeg zip
          pip3 install --upgrade yt-dlp

      - name: Download video via WARP
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          FORMAT="${{ github.event.inputs.format }}"
          SPLIT_MB="${{ github.event.inputs.split_threshold_mb }}"
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))
          
          mkdir -p videos tmp_downloads
          
          echo "🏷️ AVASAM YouTube Downloader"
          echo "📹 Downloading: $URL"
          
          # Download through WARP proxy
          yt-dlp \
            --proxy "socks5://127.0.0.1:40000" \
            --format "$FORMAT" \
            --merge-output-format mp4 \
            --output "tmp_downloads/%(title)s.%(ext)s" \
            --no-playlist \
            --retries 5 \
            --fragment-retries 5 \
            "$URL"
          
          # Handle file splitting
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")
            
            if [ "$SPLIT_BYTES" -gt 0 ] && [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
              echo "✂️ Splitting $BASENAME ($(( SIZE / 1024 / 1024 ))MB)..."
              zip -0 -s "${SPLIT_MB}m" "videos/${BASENAME}.zip" -j "$FILE"
            else
              cp "$FILE" "videos/$BASENAME"
            fi
          done
          rm -rf tmp_downloads

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git add videos/
          git commit -m "[AVASAM] YouTube download [skip ci]" || exit 0
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
