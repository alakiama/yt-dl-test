name: Download YouTube Video (EJS Node only)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup yt-dlp (EJS Node + FFmpeg enabled by default)
        uses: AnimMouse/setup-yt-dlp@v3
        # ejs-node and ffmpeg are true by default – no need to specify

      - name: Create downloads folder
        run: mkdir -p downloads

      - name: Download video (no cookies, relies on EJS Node)
        run: |
          cd downloads
          yt-dlp -f "bestvideo+bestaudio/best" -o "%(title)s.%(ext)s" "${{ github.event.inputs.url }}"

      - name: Split files >90MB into zip parts
        run: |
          cd downloads
          for f in *; do
            if [ -f "$f" ] && [ $(stat -c%s "$f") -gt $((90*1024*1024)) ]; then
              zip -s 90m "${f%.*}.zip" "$f" && rm "$f"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add downloads/
          git diff --staged --quiet || git commit -m "Add YouTube video from ${{ github.event.inputs.url }}"
          git push
