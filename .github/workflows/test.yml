name: Get Direct YouTube Video URL

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  get-url:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install yt-dlp bgutil-ytdlp-pot-provider
      - run: docker run -d --name pot-provider -p 4416:4416 brainicism/bgutil-ytdlp-pot-provider && sleep 5
      - name: Extract URL (skip warnings)
        run: |
          mkdir -p output
          # Use 2>/dev/null to hide stderr (warnings), keep only stdout (the URL)
          DIRECT_URL=$(yt-dlp \
            --extractor-args "youtube:po_token_provider=bgutil-http://localhost:4416" \
            --extractor-args "youtube:player_client=android" \
            -g \
            "${{ github.event.inputs.url }}" 2>/dev/null | head -1)
          echo "$DIRECT_URL" > output/stream_url.txt
          echo "Direct URL: $DIRECT_URL"
      - run: |
          git config user.name "github-actions"
          git add output/
          git commit -m "Add direct URL" || true
          git push
