name: Download YouTube Video (Cookie + Split)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup yt-dlp (with EJS Node and FFmpeg)
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ejs-node: true
          ffmpeg: true

      - name: Inject YouTube cookies (decoded from secret)
        uses: AnimMouse/setup-yt-dlp/cookies@v3
        with:
          cookies: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Create download folder
        run: mkdir -p downloads

      - name: Download video
        run: |
          cd downloads
          yt-dlp -f "bestvideo+bestaudio/best" -o "%(title)s.%(ext)s" "${{ github.event.inputs.url }}"

      - name: Split files larger than 90MB into zip parts
        run: |
          cd downloads
          for file in *; do
            if [ -f "$file" ] && [ $(stat -c%s "$file") -gt $((90 * 1024 * 1024)) ]; then
              echo "Splitting $file (size > 90 MB)"
              zip -s 90m "${file%.*}.zip" "$file"
              rm "$file"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add downloads/
          git diff --staged --quiet || git commit -m "Add YouTube video from ${{ github.event.inputs.url }}"
          git push
