name: Test Free Proxies for YouTube Direct URL

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: pip install yt-dlp

      - name: Fetch free proxies from SandVPN
        run: |
          curl -s "https://api.sandvpn.com/fetch-free-proxys" | jq -r '.[] | select(.paid == false) | "\(.host):\(.port)"' > proxies.txt
          echo "Found $(wc -l < proxies.txt) free proxies"
          cat proxies.txt

      - name: Test each proxy for YouTube direct URL
        run: |
          URL="${{ github.event.inputs.url }}"
          SUCCESS=""
          while read proxy; do
            [ -z "$proxy" ] && continue
            echo "Testing proxy: $proxy"
            result=$(timeout 20 yt-dlp --proxy "http://$proxy" -g "$URL" 2>/dev/null | head -1)
            if [ -n "$result" ] && echo "$result" | grep -qE '^https?://'; then
              echo "✅ SUCCESS with proxy $proxy"
              echo "$result" > direct_url.txt
              SUCCESS="$result"
              break
            fi
          done < proxies.txt
          if [ -z "$SUCCESS" ]; then
            echo "❌ No working proxy found"
            exit 1
          fi

      - name: Show direct URL
        run: cat direct_url.txt
