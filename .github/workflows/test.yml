name: Download with Proxy
on:
  workflow_dispatch:
    inputs:
      url: { required: true, type: string }
permissions: { contents: write }

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install yt-dlp-proxy
      - run: yt-dlp-proxy update  # fetch & test proxies
      - run: |
          mkdir -p videos
          cd videos
          yt-dlp-proxy ${{ github.event.inputs.url }}
      - run: |
          git config user.name github-actions
          git add videos/ && git commit -m "video" || true
          git push
