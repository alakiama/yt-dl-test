name: Get YouTube Direct URL

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true

permissions:
  contents: write

jobs:
  get-url:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: AnimMouse/setup-yt-dlp@v3
        with:
          ejs-node: true
      - run: mkdir -p output
      - run: yt-dlp -g "${{ github.event.inputs.url }}" > output/url.txt
      - run: |
          git config user.name "github-actions"
          git add output/ && git commit -m "url" || true
          git push
